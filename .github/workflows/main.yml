name: BG Remover Bot

on:
  workflow_dispatch: # ম্যানুয়ালি স্টার্ট করার জন্য
  schedule:
    - cron: '0 */4 * * *' # প্রতি ৪ ঘণ্টা পর পর নতুন করে ট্রিগার হবে

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bot
        run: |
          # Infinite loop to handle the 4-hour restart inside the same job
          while true; do
            python bot.py
            echo "Bot exited. Restarting in 5 seconds..."
            sleep 5
          done
